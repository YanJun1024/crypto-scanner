name: Crypto Hourly Scanner

on:
  # 定时触发：每小时的第6分钟运行（UTC 时间）
  # 北京时间对应每小时的第6分钟（例如 08:06, 09:06 ...）
  schedule:
    - cron: '6 * * * *'
  # 手动触发：方便在 Actions 页面点击运行测试
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码（v4 已支持 Node.js 24）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Python 3.11（v5 已支持 Node.js 24）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装项目依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. 运行扫描脚本（从 Secrets 读取企业微信 Webhook）
      - name: Run scanner
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python scanner.py